packages:
  "framer-motion": "For page transitions and interactive hover effects"
  "recharts": "For network stats and bandwidth charts on the dashboard"
  "date-fns": "For formatting joined and updated timestamps"
  "react-hook-form": "For form state management"
  "@hookform/resolvers": "For Zod validation integration with react-hook-form"
  "clsx": "Utility for constructing className strings conditionally"
  "tailwind-merge": "Utility to cleanly merge Tailwind classes"

images:
  - path: "artifacts/federated-hosting/public/images/network-bg.png"
    description: "Subtle abstract dark background with a glowing cyan and purple wireframe network mesh, very faint, low opacity"
    aspect_ratio: "16:9"
  - path: "artifacts/federated-hosting/public/images/logo-mark.png"
    description: "Minimalist tech logo mark consisting of interconnected nodes or glowing geometric shapes in neon cyan and purple, transparent background"
    aspect_ratio: "1:1"

notes:
  - Assuming @workspace/api-client-react provides all TanStack Query hooks
  - Relying on existing shadcn UI components in src/components/ui/
  - Setting default theme to dark mode by modifying :root in index.css
