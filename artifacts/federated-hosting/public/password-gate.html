<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Required</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f; --surface: #12121a; --border: rgba(255,255,255,.08);
      --text: #e4e4f0; --muted: #6b7280; --primary: #00e5ff; --error: #f87171;
    }
    body {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, sans-serif;
      padding: 1rem;
    }
    .card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
      padding: 40px 36px; width: 100%; max-width: 380px;
      box-shadow: 0 25px 50px rgba(0,0,0,.5);
    }
    .lock { font-size: 2.5rem; text-align: center; margin-bottom: 1.25rem; }
    h1 { font-size: 1.2rem; font-weight: 700; text-align: center; margin-bottom: .4rem; }
    .subtitle { color: var(--muted); font-size: .875rem; text-align: center; margin-bottom: 1.75rem; }
    .field { margin-bottom: .875rem; }
    input[type="password"] {
      width: 100%; padding: 12px 16px; background: #1a1a26;
      border: 1px solid var(--border); border-radius: 10px;
      color: var(--text); font-size: 1rem; outline: none; transition: border-color .15s, box-shadow .15s;
    }
    input[type="password"]:focus {
      border-color: var(--primary); box-shadow: 0 0 0 3px rgba(0,229,255,.15);
    }
    button {
      width: 100%; padding: 12px; background: var(--primary); color: #000;
      border: none; border-radius: 10px; font-weight: 700; font-size: .95rem;
      cursor: pointer; transition: opacity .15s;
    }
    button:disabled { opacity: .6; cursor: not-allowed; }
    button:not(:disabled):hover { opacity: .9; }
    .error {
      color: var(--error); font-size: .82rem; text-align: center;
      margin-top: .75rem; min-height: 1.2rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="lock">🔒</div>
    <h1>Password Required</h1>
    <p class="subtitle" id="domain-label">This site is password protected.</p>
    <form id="form">
      <div class="field">
        <input type="password" id="password" placeholder="Enter password" autofocus required autocomplete="current-password" />
      </div>
      <button type="submit" id="btn">Unlock</button>
      <p class="error" id="error" aria-live="polite"></p>
    </form>
  </div>
  <script>
    // Site ID and domain injected by the server as data attributes on body
    const siteId = document.body.dataset.siteId;
    const domain = document.body.dataset.domain;
    if (domain) document.getElementById('domain-label').textContent = domain + ' is password protected.';

    document.getElementById('form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btn');
      const err = document.getElementById('error');
      const pw  = document.getElementById('password').value;

      btn.disabled = true;
      btn.textContent = 'Checking…';
      err.textContent = '';

      try {
        const res = await fetch(`/api/sites/${siteId}/unlock`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: pw }),
          credentials: 'include',
        });

        if (res.ok) {
          location.reload();
        } else {
          err.textContent = 'Incorrect password. Try again.';
          document.getElementById('password').value = '';
          document.getElementById('password').focus();
        }
      } catch {
        err.textContent = 'Network error. Please try again.';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Unlock';
      }
    });
  </script>
</body>
</html>
