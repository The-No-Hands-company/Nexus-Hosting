  # ── IP bans ───────────────────────────────────────────────────────────────────

  /api/admin/ip-bans:
    get:
      summary: List active IP bans (admin only)
      tags: [Admin]
      security: [{cookieAuth: []}]
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
