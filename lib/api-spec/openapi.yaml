        siteDomain:
          type: string
        filesSync:
          type: integer
        failedFiles:
          type: integer
        originDomain:
          type: string

    FederationManifest:
      type: object
      properties:
        site:
          type: object
        deployment:
          $ref: "#/components/schemas/SiteDeployment"
        files:
          type: array
          items:
            type: object
            properties:
              filePath:
                type: string
              contentType:
                type: string
              sizeBytes:
                type: integer
              downloadUrl:
                type: string
        signature:
          type: ["string", "null"]
        servedBy:
          type: string
        expiresAt:
          type: string

    PaginatedEvents:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            type: object
        meta:
          $ref: "#/components/schemas/PaginationMeta"

    GossipResponse:
      type: object
      properties:
        domain:
          type: string
        peerCount:
          type: integer
        peers:
          type: array
          items:
            type: object
        servedAt:
          type: string

    GossipPushBody:
      type: object
      required: [fromDomain, peers, timestamp]
      properties:
        fromDomain:
          type: string
        peers:
          type: array
          items:
            type: object
            properties:
              domain:
                type: string
              name:
                type: string
              publicKey:
                type: string
              region:
                type: string
        timestamp:
          type: number

    BootstrapResponse:
      type: object
      properties:
        protocol:
          type: string
        description:
          type: string
        servedBy:
          type: string
        generatedAt:
          type: string
        nodeCount:
          type: integer
        nodes:
          type: array
          items:
            type: object
            properties:
              domain:
                type: string
              name:
                type: string
              region:
                type: string
              publicKey:
                type: ["string", "null"]
              verifiedAt:
                type: ["string", "null"]
        docs:
          type: string

    AuthUser:
      type: object
      required: [id]
      properties:
        id:
          type: string
        email:
          type: ["string", "null"]
        firstName:
          type: ["string", "null"]
        lastName:
          type: ["string", "null"]
        profileImageUrl:
          type: ["string", "null"]

    GetCurrentAuthUserResponse:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: "#/components/schemas/AuthUser"
            - type: "null"

    ExchangeMobileAuthorizationCodeBody:
      type: object
      required: [code, code_verifier, redirect_uri, state]
      properties:
        code:
          type: string
        code_verifier:
          type: string
        redirect_uri:
          type: string
        state:
          type: string
        nonce:
          type: string

    ExchangeMobileAuthorizationCodeResponse:
      type: object
      required: [token]
      properties:
        token:
          type: string

    LogoutMobileSessionResponse:
      type: object
      required: [success]
      properties:
        success:
          type: boolean

    RequestUploadUrlBody:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
        size:
          type: integer
        contentType:
          type: string

    RequestUploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
        objectPath:
          type: string

  /domains/{id}/tls-status:
    get:
      summary: Get TLS certificate status for a custom domain
      tags: [Domains]
      security: [{sessionCookie: []}, {bearerToken: []}]
      parameters:
        - {name: id, in: path, required: true, schema: {type: integer}}
      responses:
        '200':
          description: TLS status
          content:
            application/json:
              schema:
                type: object
                properties:
                  domainId: {type: integer}
                  domain: {type: string}
                  domainVerified: {type: boolean}
                  acmeEnabled: {type: boolean}
                  certExists: {type: boolean}
                  certExpiry: {type: string, nullable: true}
                  daysUntilExpiry: {type: integer, nullable: true}
                  isValid: {type: boolean}
                  willAutoRenew: {type: boolean}

  /domains/{id}/provision-tls:
    post:
      summary: Provision or renew a TLS certificate for a custom domain
      tags: [Domains]
      security: [{sessionCookie: []}, {bearerToken: []}]
      parameters:
        - {name: id, in: path, required: true, schema: {type: integer}}
        - {name: force, in: query, schema: {type: boolean}}
      responses:
        '200':
          description: Provisioning started or status response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: {type: string, enum: [provisioning, already_valid, manual_required]}
                  domain: {type: string}
                  message: {type: string}

  /admin/audit-log:
    get:
      summary: Paginated admin action history
      tags: [Admin]
      security: [{sessionCookie: []}, {bearerToken: []}]
      parameters:
        - {name: page,  in: query, schema: {type: integer, default: 1}}
        - {name: limit, in: query, schema: {type: integer, default: 50, maximum: 100}}
      responses:
        '200':
          description: Audit log entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id: {type: integer}
                        actor_id: {type: string}
                        actor_email: {type: string, nullable: true}
                        action: {type: string}
                        target_type: {type: string, nullable: true}
                        target_id: {type: string, nullable: true}
                        metadata: {type: object, nullable: true}
                        ip_address: {type: string, nullable: true}
                        created_at: {type: string, format: date-time}
                  meta:
                    type: object
                    properties:
                      total: {type: integer}
                      page: {type: integer}
                      limit: {type: integer}

  /metrics:
    get:
      summary: Prometheus metrics scrape endpoint
      tags: [Monitoring]
      security: [{bearerToken: []}]
      responses:
        '200':
          description: Prometheus text format metrics
          content:
            text/plain:
              schema: {type: string}
        '401':
          description: Unauthorized (METRICS_TOKEN mismatch)
