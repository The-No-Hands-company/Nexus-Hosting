  # ── Federation blocklist (defederation) ─────────────────────────────────────

  /federation/blocks:
    get:
      summary: List blocked federation nodes (admin only)
      tags: [Federation]
      security: [{sessionCookie: []}]
      responses:
        '200':
          description: Blocklist with total count
          content:
            application/json:
              schema:
                type: object
                properties:
                  blocks:
                    type: array
                    items:
                      type: object
                      properties:
                        id:          {type: integer}
                        nodeDomain:  {type: string}
                        reason:      {type: string, nullable: true}
                        blockedBy:   {type: string, nullable: true}
                        createdAt:   {type: string, format: date-time}
                  total: {type: integer}
        '403': {description: Admin access required}
    post:
      summary: Block a federation node (admin only)
      tags: [Federation]
      security: [{sessionCookie: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [nodeDomain]
              properties:
                nodeDomain: {type: string, description: Domain of the node to block}
                reason:     {type: string, maxLength: 500}
      responses:
        '201':
          description: Node blocked — also marks the peer as inactive in nodes table
        '409': {description: Node is already blocked}
        '403': {description: Admin access required}

  /federation/blocks/{domain}:
    delete:
      summary: Unblock a federation node (admin only)
      tags: [Federation]
      security: [{sessionCookie: []}]
      parameters:
        - {name: domain, in: path, required: true, schema: {type: string}}
      responses:
        '200': {description: Node unblocked}
        '404': {description: No block found for this domain}
        '403': {description: Admin access required}

  /federation/blocks/check:
    get:
      summary: Check whether a domain is on this node's blocklist (public)
      description: |
        Peers can call this before initiating a handshake to avoid a wasted
        round-trip. Returns 200 with blocked=true/false rather than 403 so
        callers can handle it gracefully without error logic.
      tags: [Federation]
      parameters:
        - {name: domain, in: query, required: true, schema: {type: string}}
      responses:
        '200':
          description: Block status
          content:
            application/json:
              schema:
                type: object
                properties:
                  domain:  {type: string}
                  blocked: {type: boolean}
        '400': {description: domain query parameter missing}

  # ── Email verification ────────────────────────────────────────────────────────

  /api/auth/verify-email:
    get:
      summary: Consume an email verification token
      description: |
        Called via the link in the verification email.
        On success, sets emailVerified=1 on the user and redirects to /dashboard?email_verified=1.
        On failure, redirects to /?error=invalid_or_expired_token.
      tags: [Auth]
      parameters:
        - {name: token, in: query, required: true, schema: {type: string}}
      responses:
        '302': {description: Redirect on success or failure}

  /api/auth/resend-verification:
    post:
      summary: Re-send email verification link
      description: Rate-limited. Requires authentication. No-op if already verified.
      tags: [Auth]
      security: [{cookieAuth: []}]
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:      {type: boolean}
                  message: {type: string}
        '401': {description: Not authenticated}

  # ── Abuse reports ─────────────────────────────────────────────────────────────

  /api/abuse/report:
    post:
      summary: Submit an abuse report for a site
      description: |
        Public endpoint — no authentication required.
        Rate-limited to prevent spam.
      tags: [Abuse]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [siteDomain, reason]
              properties:
                siteDomain:    {type: string, description: Primary domain of the site being reported}
                reason:
                  type: string
                  enum: [spam, phishing, malware, csam, copyright, harassment, illegal_content, other]
                description:   {type: string, maxLength: 2000}
                evidenceUrl:   {type: string, format: uri}
                reporterEmail: {type: string, format: email}
      responses:
        '201':
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:      {type: boolean}
                  message: {type: string}
        '404': {description: Site not found}

  /api/abuse/reports:
    get:
      summary: List abuse reports (admin only)
      tags: [Abuse, Admin]
      security: [{cookieAuth: []}]
      parameters:
        - {name: status, in: query, schema: {type: string, enum: [pending, under_review, resolved_removed, resolved_no_action, escalated]}}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: {$ref: '#/components/schemas/AbuseReport'}

  /api/abuse/reports/{id}:
    patch:
      summary: Update abuse report status (admin only)
      tags: [Abuse, Admin]
      security: [{cookieAuth: []}]
      parameters:
        - {name: id, in: path, required: true, schema: {type: integer}}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [pending, under_review, resolved_removed, resolved_no_action, escalated]
                reviewNotes: {type: string, maxLength: 2000}
      responses:
        '200': {description: Updated report}
        '404': {description: Report not found}

  /api/abuse/reports/{id}/takedown:
    post:
      summary: Take down a site and resolve report (admin only)
      description: Suspends the site and marks report as resolved_removed.
      tags: [Abuse, Admin]
      security: [{cookieAuth: []}]
      parameters:
        - {name: id, in: path, required: true, schema: {type: integer}}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:      {type: boolean}
                  message: {type: string}

  # ── IP bans ───────────────────────────────────────────────────────────────────

  /api/admin/ip-bans:
    get:
      summary: List active IP bans (admin only)
      tags: [Admin]
      security: [{cookieAuth: []}]
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: {type: array, items: {$ref: '#/components/schemas/IpBan'}}
    post:
      summary: Create an IP ban (admin only)
      tags: [Admin]
      security: [{cookieAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ipAddress]
              properties:
                ipAddress: {type: string, description: IPv4 address}
                cidrRange: {type: string, description: CIDR range e.g. 1.2.3.0/24}
                reason:    {type: string, maxLength: 500}
                scope:     {type: string, enum: [api, sites, all], default: all}
                expiresAt: {type: string, format: date-time, description: Null for permanent ban}
      responses:
        '201': {description: Ban created}

  /api/admin/ip-bans/{id}:
    delete:
      summary: Remove an IP ban (admin only)
      tags: [Admin]
      security: [{cookieAuth: []}]
      parameters:
        - {name: id, in: path, required: true, schema: {type: integer}}
      responses:
        '204': {description: Ban removed}
        '404': {description: Ban not found}

  # ── Node trust ────────────────────────────────────────────────────────────────

  /api/admin/node-trust:
    get:
      summary: List federation node trust scores (admin only)
      tags: [Admin, Federation]
      security: [{cookieAuth: []}]
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: {type: array, items: {$ref: '#/components/schemas/NodeTrust'}}


