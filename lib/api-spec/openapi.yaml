      properties:
        node:
          $ref: "#/components/schemas/Node"
        summary:
          type: object
        analytics24h:
          type: object
        recentEvents:
          type: array
          items:
            type: object
        systemInfo:
          type: object

    UpdateNodeSettingsBody:
      type: object
      properties:
        name:
          type: string
        region:
          type: string
        operatorEmail:
          type: string
          format: email
        maxStorageGb:
          type: number
        description:
          type: string

    PaginatedUsers:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            type: object
        meta:
          $ref: "#/components/schemas/PaginationMeta"

    CapacitySummary:
      type: object
      properties:
        totalNodes:
          type: integer
        totalStorageGb:
          type: number
        usedStorageGb:
          type: number
        totalBandwidthGb:
          type: number

    FederationMeta:
      type: object
      properties:
        protocol:
          type: string
        name:
          type: string
        domain:
          type: string
        region:
          type: string
        publicKey:
          type: ["string", "null"]
        nodeCount:
          type: integer
        activeSites:
          type: integer
        joinedAt:
          type: string
        capabilities:
          type: array
          items:
            type: string

    HandshakeResult:
      type: object
      properties:
        success:
          type: boolean
        targetUrl:
          type: string
        discoveryData:
          type: ["object", "null"]
        pingResult:
          type: ["object", "null"]
        error:
          type: ["string", "null"]

    FederationPingBody:
      type: object
      required: [nodeDomain, challenge, signature]
      properties:
        nodeDomain:
          type: string
        challenge:
          type: string
        signature:
          type: string
        timestamp:
          type: string

    FederationSyncResult:
