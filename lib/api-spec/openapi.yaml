                  type: object
                  properties:
                    name:
                      type: string
                    type:
                      type: string
                    value:
                      type: string
                cname:
                  type: object
                  properties:
                    name:
                      type: string
                    type:
                      type: string
                    value:
                      type: string

    SiteAnalyticsResponse:
      type: object
      properties:
        period:
          type: string
        totals:
          type: object
          properties:
            hits:
              type: integer
            bytesServed:
              type: integer
            uniqueIps:
              type: integer
        hourly:
          type: array
          items:
            type: object
        topReferrers:
          type: array
          items:
            type: object
            properties:
              referrer:
                type: string
              count:
                type: integer
        topPaths:
          type: array
          items:
            type: object
            properties:
              path:
                type: string
              count:
                type: integer

    AdminAnalyticsResponse:
      type: object
      properties:
        last24h:
          type: object
          properties:
            hits:
              type: integer
            bytesServed:
              type: integer
        last7d:
          type: object
          properties:
            hits:
              type: integer
            bytesServed:
              type: integer
        topSites:
          type: array
          items:
            type: object

    AdminOverview:
