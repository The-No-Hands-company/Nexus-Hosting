  AbuseReportBody:
    type: object
    required: [siteDomain, reason]
    properties:
      siteDomain: {type: string}
      reason: {type: string, enum: [spam, phishing, malware, csam, copyright, harassment, illegal_content, other]}
      description: {type: string, maxLength: 2000}
      evidenceUrl: {type: string, format: uri}
      reporterEmail: {type: string, format: email}

  # ── Cloud integration ───────────────────────────────────────────────────────

  /cloud/.well-known/nexus-cloud:
    get:
      operationId: getNexusCloudDiscoveryWellKnown
      tags: [cloud]
      summary: Get the canonical Nexus Cloud discovery payload
      responses:
        "200":
          description: Cloud discovery metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NexusCloudDiscovery"

  /cloud/discovery:
    get:
      operationId: getNexusCloudDiscovery
      tags: [cloud]
      summary: Get the full Nexus Cloud app graph
      responses:
        "200":
          description: Cloud discovery metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NexusCloudDiscoveryEnvelope"

  /cloud/register:
    post:
      operationId: registerWithNexusCloud
      tags: [cloud]
      summary: Register an app or service with Nexus Cloud
      security:
        - bearerToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NexusCloudRegistrationRequest"
      responses:
        "201":
          description: Registration accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NexusCloudRegistrationResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /cloud/client:
    get:
      operationId: getNexusCloudClientContract
      tags: [cloud]
      summary: Get the service-to-service client contract for Nexus Cloud integration
      responses:
        "200":
          description: Client contract
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NexusCloudClientEnvelope"

  # ── Existing schemas below ──────────────────────────────────────────────────

components:
  securitySchemes:
    sessionAuth:
      type: apiKey
      in: cookie
      name: sid
      description: Browser session cookie set by /login flow
    bearerToken:
      type: http
      scheme: bearer
      description: API token created via POST /tokens (prefix fh_)

  parameters:
    IdPath:
      name: id
      in: path
      required: true
      schema:
        type: integer
    PageParam:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
    LimitParam:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: "Bearer <sid> — session token"
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      schema:
        type: string

  responses:
    BadRequest:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Resource already exists
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:

    ErrorResponse:
      type: object
      required: [message, code]
      properties:
        message:
          type: string
        code:
          type: string
        status:
          type: integer

    PaginationMeta:
      type: object
      required: [total, page, limit, totalPages, hasNextPage, hasPrevPage]
      properties:
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        totalPages:
          type: integer
        hasNextPage:
          type: boolean
        hasPrevPage:
          type: boolean

    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [healthy, degraded, error]
        uptime:
          type: number
        version:
          type: string
        environment:
          type: string
        services:
          type: object

    FederationStats:
      type: object
      required: [totalNodes, activeNodes, totalSites, activeSites, totalBandwidthGb, totalStorageGb, uptimePercent]
      properties:
        totalNodes:
          type: integer
        activeNodes:
          type: integer
        totalSites:
          type: integer
        activeSites:
          type: integer
        totalBandwidthGb:
          type: number
        totalStorageGb:
          type: number
        uptimePercent:
          type: number

    Node:
      type: object
      required: [id, name, domain, status, region, operatorName, operatorEmail, storageCapacityGb, bandwidthCapacityGb, joinedAt]
      properties:
        id:
          type: integer
        name:
          type: string
        domain:
          type: string
        description:
          type: ["string", "null"]
        status:
          type: string
          enum: [active, inactive, maintenance]
        region:
          type: string
        operatorName:
          type: string
        operatorEmail:
          type: string
        storageCapacityGb:
          type: number
        bandwidthCapacityGb:
          type: number
        uptimePercent:
          type: number
        siteCount:
          type: integer
        publicKey:
          type: ["string", "null"]
        isLocalNode:
          type: integer
        joinedAt:
          type: string
        lastSeenAt:
          type: ["string", "null"]
        verifiedAt:
          type: ["string", "null"]

    PaginatedNodes:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Node"
        meta:
          $ref: "#/components/schemas/PaginationMeta"

    CreateNodeBody:
      type: object
      required: [name, domain, region, operatorName, operatorEmail, storageCapacityGb, bandwidthCapacityGb]
      properties:
        name:
          type: string
        domain:
          type: string
        description:
          type: string
        region:
          type: string
        operatorName:
          type: string
        operatorEmail:
          type: string
        storageCapacityGb:
          type: number
        bandwidthCapacityGb:
          type: number
        publicKey:
          type: string

    UpdateNodeBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [active, inactive, maintenance]
        region:
          type: string
        operatorName:
          type: string
        operatorEmail:
          type: string
        storageCapacityGb:
          type: number
        bandwidthCapacityGb:
          type: number

    NodeCapacity:
      type: object
      properties:
        nodeId:
          type: integer
        domain:
          type: string
        storageCapacityGb:
          type: number
        storageUsedGb:
          type: number
        storageAvailableGb:
          type: number
        bandwidthCapacityGb:
          type: number
        siteCount:
          type: integer

    Site:
      type: object
      required: [id, name, domain, status, siteType, ownerName, ownerEmail, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        domain:
          type: string
        description:
          type: ["string", "null"]
        status:
          type: string
          enum: [active, suspended, migrating]
        siteType:
          type: string
          enum: [static, dynamic, blog, portfolio, other]
        visibility:
          type: string
          enum: [public, private, password]
        ownerName:
          type: string
        ownerEmail:
          type: string
        ownerId:
          type: ["string", "null"]
        primaryNodeId:
          type: ["integer", "null"]
        primaryNodeDomain:
          type: ["string", "null"]
        replicaCount:
          type: integer
        storageUsedMb:
          type: number
        monthlyBandwidthGb:
          type: number
        hitCount:
          type: integer
        createdAt:
          type: string
        updatedAt:
          type: string

    PaginatedSites:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Site"
        meta:
          $ref: "#/components/schemas/PaginationMeta"

    CreateSiteBody:
      type: object
      required: [name, domain, siteType, ownerName, ownerEmail]
      properties:
        name:
          type: string
        domain:
          type: string
        description:
          type: string
        siteType:
          type: string
          enum: [static, dynamic, blog, portfolio, other]
        ownerName:
          type: string
        ownerEmail:
          type: string
        primaryNodeId:
          type: integer

    UpdateSiteBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [active, suspended, migrating]
        siteType:
          type: string
          enum: [static, dynamic, blog, portfolio, other, nlpl]
        primaryNodeId:
          type: integer
        spaRouting:
          type: integer
          enum: [0, 1]
          description: "1 = serve index.html for unknown paths (SPA), 0 = strict 404 (MPA)"

    SiteFile:
      type: object
      required: [id, siteId, filePath, objectPath, contentType, sizeBytes, createdAt]
      properties:
        id:
          type: integer
        siteId:
          type: integer
        deploymentId:
          type: ["integer", "null"]
        filePath:
          type: string
        objectPath:
          type: string
        contentType:
          type: string
        sizeBytes:
          type: integer
        createdAt:
          type: string

    SiteFileUploadUrlBody:
      type: object
      required: [filePath, contentType, size]
      properties:
        filePath:
          type: string
        contentType:
          type: string
        size:
          type: integer

    SiteFileUploadUrlResponse:
      type: object
      required: [uploadUrl, objectPath, filePath]
      properties:
        uploadUrl:
          type: string
        objectPath:
          type: string
        filePath:
          type: string

    RegisterSiteFileBody:
      type: object
      required: [filePath, objectPath, contentType, sizeBytes]
      properties:
        filePath:
          type: string
        objectPath:
          type: string
        contentType:
          type: string
        sizeBytes:
          type: integer

    SiteDeployment:
      type: object
      required: [id, siteId, version, status, fileCount, totalSizeMb, deployedAt]
      properties:
        id:
          type: integer
        siteId:
          type: integer
        version:
          type: integer
        status:
          type: string
          enum: [pending, active, failed, rolled_back]
        deployedBy:
          type: ["string", "null"]
        fileCount:
          type: integer
        totalSizeMb:
          type: number
        deployedAt:
          type: string
        createdAt:
          type: string

    DeployResult:
      allOf:
        - $ref: "#/components/schemas/SiteDeployment"
        - type: object
          properties:
            replication:
              type: object
              properties:
                peers:
                  type: integer
                synced:
                  type: integer
                results:
                  type: array
                  items:
                    type: object
                    properties:
                      node:
                        type: string
                      success:
                        type: boolean
                      error:
                        type: ["string", "null"]

    ApiToken:
      type: object
      required: [id, name, tokenPrefix, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        tokenPrefix:
          type: string
        lastUsedAt:
          type: ["string", "null"]
        expiresAt:
          type: ["string", "null"]
        createdAt:
          type: string
        revokedAt:
          type: ["string", "null"]

    CreatedToken:
      allOf:
        - $ref: "#/components/schemas/ApiToken"
        - type: object
          required: [token]
          properties:
            token:
              type: string
              description: "Plaintext token — shown once only. Store securely."

    CreateTokenBody:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 80
        expiresInDays:
          type: integer
          minimum: 1
          maximum: 365

    SiteMember:
      type: object
      required: [id, siteId, userId, role, createdAt]
      properties:
        id:
          type: integer
        siteId:
          type: integer
        userId:
          type: string
        role:
          type: string
          enum: [owner, editor, viewer]
        invitedByUserId:
          type: ["string", "null"]
        acceptedAt:
          type: ["string", "null"]
        createdAt:
          type: string
        email:
          type: ["string", "null"]
        firstName:
          type: ["string", "null"]
        lastName:
          type: ["string", "null"]

    AddMemberBody:
      type: object
      required: [userId]
      properties:
        userId:
          type: string
        role:
          type: string
          enum: [editor, viewer]
          default: viewer

    UpdateVisibilityBody:
      type: object
      required: [visibility]
      properties:
        visibility:
          type: string
          enum: [public, private, password]
        password:
          type: string
          minLength: 6
          description: Required when visibility is "password"

    CustomDomain:
      type: object
      required: [id, siteId, domain, verificationToken, status, createdAt]
      properties:
        id:
          type: integer
        siteId:
          type: integer
        domain:
          type: string
        verificationToken:
          type: string
        status:
          type: string
          enum: [pending, verified, failed]
        verifiedAt:
          type: ["string", "null"]
        lastCheckedAt:
          type: ["string", "null"]
        lastError:
          type: ["string", "null"]
        createdAt:
          type: string

    CustomDomainWithInstructions:
      allOf:
        - $ref: "#/components/schemas/CustomDomain"
        - type: object
          properties:
            instructions:
              type: object
              properties:
                txt:
                  type: object
                  properties:
                    name:
                      type: string
                    type:
                      type: string
                    value:
                      type: string
                cname:
                  type: object
                  properties:
                    name:
                      type: string
                    type:
                      type: string
                    value:
                      type: string

    SiteAnalyticsResponse:
      type: object
      properties:
        period:
          type: string
        totals:
          type: object
          properties:
            hits:
              type: integer
            bytesServed:
              type: integer
            uniqueIps:
              type: integer
        hourly:
          type: array
          items:
            type: object
        topReferrers:
          type: array
          items:
            type: object
            properties:
              referrer:
                type: string
              count:
                type: integer
        topPaths:
          type: array
          items:
            type: object
            properties:
              path:
                type: string
              count:
                type: integer

    AdminAnalyticsResponse:
      type: object
      properties:
        last24h:
          type: object
          properties:
            hits:
              type: integer
            bytesServed:
              type: integer
        last7d:
          type: object
          properties:
            hits:
              type: integer
            bytesServed:
              type: integer
        topSites:
          type: array
          items:
            type: object

    AdminOverview:
      type: object
      properties:
        node:
          $ref: "#/components/schemas/Node"
        summary:
          type: object
        analytics24h:
          type: object
        recentEvents:
          type: array
          items:
            type: object
        systemInfo:
          type: object

    UpdateNodeSettingsBody:
      type: object
      properties:
        name:
          type: string
        region:
          type: string
        operatorEmail:
          type: string
          format: email
        maxStorageGb:
          type: number
        description:
          type: string

    PaginatedUsers:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            type: object
        meta:
          $ref: "#/components/schemas/PaginationMeta"

    CapacitySummary:
      type: object
      properties:
        totalNodes:
          type: integer
        totalStorageGb:
          type: number
        usedStorageGb:
          type: number
        totalBandwidthGb:
          type: number

    FederationMeta:
      type: object
      properties:
        protocol:
          type: string
        name:
          type: string
        domain:
          type: string
        region:
          type: string
        publicKey:
          type: ["string", "null"]
        nodeCount:
          type: integer
        activeSites:
          type: integer
        joinedAt:
          type: string
        capabilities:
          type: array
          items:
            type: string

    HandshakeResult:
      type: object
      properties:
        success:
          type: boolean
        targetUrl:
          type: string
        discoveryData:
          type: ["object", "null"]
        pingResult:
          type: ["object", "null"]
        error:
          type: ["string", "null"]

    FederationPingBody:
      type: object
      required: [nodeDomain, challenge, signature]
      properties:
        nodeDomain:
          type: string
        challenge:
          type: string
        signature:
          type: string
        timestamp:
          type: string

    FederationSyncResult:
      type: object
      properties:
        status:
          type: string
          enum: [synced, skipped, queued, failed]
        siteDomain:
          type: string
        filesSync:
          type: integer
        failedFiles:
          type: integer
        originDomain:
          type: string

    FederationManifest:
      type: object
      properties:
        site:
          type: object
        deployment:
          $ref: "#/components/schemas/SiteDeployment"
        files:
          type: array
          items:
            type: object
            properties:
              filePath:
                type: string
              contentType:
                type: string
              sizeBytes:
                type: integer
              downloadUrl:
                type: string
        signature:
          type: ["string", "null"]
        servedBy:
          type: string
        expiresAt:
          type: string

    PaginatedEvents:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            type: object
        meta:
          $ref: "#/components/schemas/PaginationMeta"

    GossipResponse:
      type: object
      properties:
        domain:
          type: string
        peerCount:
          type: integer
        peers:
          type: array
          items:
            type: object
        servedAt:
          type: string

    GossipPushBody:
      type: object
      required: [fromDomain, peers, timestamp]
      properties:
        fromDomain:
          type: string
        peers:
          type: array
          items:
            type: object
            properties:
              domain:
                type: string
              name:
                type: string
              publicKey:
                type: string
              region:
                type: string
        timestamp:
          type: number

    BootstrapResponse:
      type: object
      properties:
        protocol:
          type: string
        description:
          type: string
        servedBy:
          type: string
        generatedAt:
          type: string
        nodeCount:
          type: integer
        nodes:
          type: array
          items:
            type: object
            properties:
              domain:
                type: string
              name:
                type: string
              region:
                type: string
              publicKey:
                type: ["string", "null"]
              verifiedAt:
                type: ["string", "null"]
        docs:
          type: string

    AuthUser:
      type: object
      required: [id]
      properties:
        id:
          type: string
        email:
          type: ["string", "null"]
        firstName:
          type: ["string", "null"]
        lastName:
          type: ["string", "null"]
        profileImageUrl:
          type: ["string", "null"]

    GetCurrentAuthUserResponse:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: "#/components/schemas/AuthUser"
            - type: "null"

    ExchangeMobileAuthorizationCodeBody:
      type: object
      required: [code, code_verifier, redirect_uri, state]
      properties:
        code:
          type: string
        code_verifier:
          type: string
        redirect_uri:
          type: string
        state:
          type: string
        nonce:
          type: string

    ExchangeMobileAuthorizationCodeResponse:
      type: object
      required: [token]
      properties:
        token:
          type: string

    LogoutMobileSessionResponse:
      type: object
      required: [success]
      properties:
        success:
          type: boolean

    RequestUploadUrlBody:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
        size:
          type: integer
        contentType:
          type: string

    RequestUploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
        objectPath:
          type: string

  /domains/{id}/tls-status:
    get:
      summary: Get TLS certificate status for a custom domain
      tags: [Domains]
      security: [{sessionCookie: []}, {bearerToken: []}]
      parameters:
        - {name: id, in: path, required: true, schema: {type: integer}}
      responses:
        '200':
          description: TLS status
          content:
            application/json:
              schema:
                type: object
                properties:
                  domainId: {type: integer}
                  domain: {type: string}
                  domainVerified: {type: boolean}
                  acmeEnabled: {type: boolean}
                  certExists: {type: boolean}
                  certExpiry: {type: string, nullable: true}
                  daysUntilExpiry: {type: integer, nullable: true}
                  isValid: {type: boolean}
                  willAutoRenew: {type: boolean}

  /domains/{id}/provision-tls:
    post:
      summary: Provision or renew a TLS certificate for a custom domain
      tags: [Domains]
      security: [{sessionCookie: []}, {bearerToken: []}]
      parameters:
        - {name: id, in: path, required: true, schema: {type: integer}}
        - {name: force, in: query, schema: {type: boolean}}
      responses:
        '200':
          description: Provisioning started or status response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: {type: string, enum: [provisioning, already_valid, manual_required]}
                  domain: {type: string}
                  message: {type: string}

  /admin/audit-log:
    get:
      summary: Paginated admin action history
      tags: [Admin]
      security: [{sessionCookie: []}, {bearerToken: []}]
      parameters:
        - {name: page,  in: query, schema: {type: integer, default: 1}}
        - {name: limit, in: query, schema: {type: integer, default: 50, maximum: 100}}
      responses:
        '200':
          description: Audit log entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id: {type: integer}
                        actor_id: {type: string}
                        actor_email: {type: string, nullable: true}
                        action: {type: string}
                        target_type: {type: string, nullable: true}
                        target_id: {type: string, nullable: true}
                        metadata: {type: object, nullable: true}
                        ip_address: {type: string, nullable: true}
                        created_at: {type: string, format: date-time}
                  meta:
                    type: object
                    properties:
                      total: {type: integer}
                      page: {type: integer}
                      limit: {type: integer}

  /metrics:
    get:
      summary: Prometheus metrics scrape endpoint
      tags: [Monitoring]
      security: [{bearerToken: []}]
      responses:
        '200':
          description: Prometheus text format metrics
          content:
            text/plain:
              schema: {type: string}
        '401':
          description: Unauthorized (METRICS_TOKEN mismatch)

  /sites/{id}/redirects:
    get:
      summary: List redirect rules
      tags: [Sites]
      security: [{sessionCookie: []}, {bearerToken: []}]
      parameters: [{name: id, in: path, required: true, schema: {type: integer}}]
      responses:
        '200': {description: Redirect rules array}
    post:
      summary: Create redirect rule
      tags: [Sites]
      security: [{sessionCookie: []}, {bearerToken: []}]
      parameters: [{name: id, in: path, required: true, schema: {type: integer}}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [src, dest]
              properties:
                src:      {type: string, example: "/old-path/:slug"}
                dest:     {type: string, example: "/new-path/:slug"}
                status:   {type: integer, enum: [200, 301, 302, 307, 308, 404, 410], default: 301}
                force:    {type: boolean, default: false}
                position: {type: integer, default: 0}
      responses:
        '201': {description: Created rule}
    put:
      summary: Replace all redirect rules (bulk update)
      tags: [Sites]
      security: [{sessionCookie: []}, {bearerToken: []}]
      parameters: [{name: id, in: path, required: true, schema: {type: integer}}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                required: [src, dest, status, force, position]
                properties:
                  src:      {type: string, example: "/old-path/:slug"}
                  dest:     {type: string, example: "/new-path/:slug"}
                  status:   {type: integer, enum: [200, 301, 302, 307, 308, 404, 410], default: 301}
                  force:    {type: boolean, default: false}
                  position: {type: integer, default: 0}
      responses:
        '200': {description: Updated rules}

  /sites/{id}/headers:
    get:
      summary: List custom response headers
      tags: [Sites]
      security: [{sessionCookie: []}, {bearerToken: []}]
      parameters: [{name: id, in: path, required: true, schema: {type: integer}}]
      responses:
        '200': {description: Custom headers array}
    post:
      summary: Create custom response header rule
      tags: [Sites]
      security: [{sessionCookie: []}, {bearerToken: []}]
      parameters: [{name: id, in: path, required: true, schema: {type: integer}}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, value]
              properties:
                path:  {type: string, default: "/*"}
                name:  {type: string, example: "X-Frame-Options"}
                value: {type: string, example: "DENY"}
      responses:
        '201': {description: Created header rule}

  /sites/{id}/invitations:
    get:
      summary: List pending invitations
      tags: [Sites]
      security: [{sessionCookie: []}, {bearerToken: []}]
      parameters:
        - {name: id, in: path, required: true, schema: {type: integer}}
      responses:
        '200': {description: Pending invitations}
    post:
      summary: Send invitation email
      tags: [Sites]
      security: [{sessionCookie: []}, {bearerToken: []}]
      parameters:
        - {name: id, in: path, required: true, schema: {type: integer}}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: {type: string, format: email}
                role:  {type: string, enum: [editor, viewer], default: viewer}
      responses:
        '201': {description: Invitation created and email sent}

  /invitations/{token}/accept:
    post:
      summary: Accept a site invitation
      tags: [Sites]
      security: [{sessionCookie: []}, {bearerToken: []}]
      parameters:
        - {name: token, in: path, required: true, schema: {type: string}}
      responses:
        '200': {description: Invitation accepted, membership created}

  /sites/{id}/forms:
    get:
      summary: List form submissions
      tags: [Forms]
      security: [{sessionCookie: []}, {bearerToken: []}]
      parameters:
        - {name: id,    in: path,  required: true,  schema: {type: integer}}
        - {name: form,  in: query, required: false, schema: {type: string}}
        - {name: page,  in: query, schema: {type: integer, default: 1}}
        - {name: limit, in: query, schema: {type: integer, default: 50, maximum: 100}}
      responses:
        '200': {description: Form submissions with form breakdown}

  /forms/{domain}/{formName}:
    post:
      summary: Submit a form (public)
      tags: [Forms]
      parameters:
        - {name: domain,   in: path, required: true, schema: {type: string}}
        - {name: formName, in: path, required: true, schema: {type: string}}
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema: {type: object, additionalProperties: {type: string}}
          application/json:
            schema: {type: object, additionalProperties: {type: string}}
      responses:
        '200': {description: Submission accepted}
        '429': {description: Rate limit exceeded}

  /sites/{id}/builds:
    get:
      summary: List build jobs
      tags: [Builds]
      security: [{sessionCookie: []}, {bearerToken: []}]
      parameters:
        - {name: id,    in: path,  required: true,  schema: {type: integer}}
        - {name: page,  in: query, schema: {type: integer, default: 1}}
        - {name: limit, in: query, schema: {type: integer, default: 20}}
      responses:
        '200': {description: Build jobs list}
    post:
      summary: Trigger a build from Git
      tags: [Builds]
      security: [{sessionCookie: []}, {bearerToken: []}]
      parameters:
        - {name: id, in: path, required: true, schema: {type: integer}}
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                gitUrl:         {type: string, format: uri}
                gitBranch:      {type: string, default: main}
                buildCommand:   {type: string, default: "npm run build"}
                outputDir:      {type: string, default: dist}
                environment:    {type: string, enum: [production, staging, preview]}
                installCommand: {type: string}
                envVars:        {type: object, additionalProperties: {type: string}}
      responses:
        '202': {description: Build queued}

  /git-webhook/{siteId}:
    post:
      summary: Receive GitHub/GitLab push webhook to auto-trigger builds
      tags: [Builds]
      parameters:
        - {name: siteId, in: path, required: true, schema: {type: integer}}
      responses:
        '202': {description: Build triggered}
        '401': {description: Invalid webhook signature}

  /auth/2fa/setup:
    post:
      summary: Generate TOTP secret and QR code
      tags: [Auth]
      security: [{sessionCookie: []}]
      responses:
        '200':
          description: TOTP setup data
          content:
            application/json:
              schema:
                type: object
                properties:
                  secret: {type: string}
                  qrCode: {type: string, description: base64 data URL}
                  otpAuthUrl: {type: string}

  /auth/2fa/verify:
    post:
      summary: Confirm TOTP code and enable 2FA
      tags: [Auth]
      security: [{sessionCookie: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code, secret]
              properties:
                code:   {type: string, minLength: 6, maxLength: 6}
                secret: {type: string}
      responses:
        '200': {description: 2FA enabled, backup codes returned}

  /auth/2fa/validate:
    post:
      summary: Validate a TOTP or backup code
      tags: [Auth]
      security: [{sessionCookie: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code: {type: string}
      responses:
        '200': {description: Code valid}
        '400': {description: Invalid code or account locked}

  /sites/{id}/transfer:
    post:
      summary: Initiate site ownership transfer
      tags: [Sites]
      security: [{sessionCookie: []}, {bearerToken: []}]
      parameters:
        - {name: id, in: path, required: true, schema: {type: integer}}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [toEmail]
              properties:
                toEmail: {type: string, format: email}
      responses:
        '200': {description: Transfer token issued}

  /sites/{id}/export:
    get:
      summary: Export site data as JSON manifest
      tags: [Sites]
      security: [{sessionCookie: []}, {bearerToken: []}]
      parameters:
        - {name: id, in: path, required: true, schema: {type: integer}}
      responses:
        '200': {description: Site export manifest with presigned file URLs}

  /sites/import:
    post:
      summary: Import site from export manifest
      tags: [Sites]
      security: [{sessionCookie: []}, {bearerToken: []}]
      responses:
        '201': {description: Site created from import}

  /sites/{id}/env:
    get:
      summary: List site build environment variables
      tags: [Builds]
      security: [{sessionCookie: []}, {bearerToken: []}]
      parameters:
        - {name: id,          in: path,  required: true,  schema: {type: integer}}
        - {name: showSecrets, in: query, required: false, schema: {type: boolean}}
      responses:
        '200': {description: Env vars (secrets masked unless showSecrets=1)}
    post:
      summary: Set a build environment variable
      tags: [Builds]
      security: [{sessionCookie: []}, {bearerToken: []}]
      parameters:
        - {name: id, in: path, required: true, schema: {type: integer}}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [key, value]
              properties:
                key:    {type: string, pattern: "^[A-Z_][A-Z0-9_]{0,99}$"}
                value:  {type: string}
                secret: {type: integer, enum: [0, 1], default: 0}
      responses:
        '201': {description: Env var set}

  /sites/{id}/analytics/export:
    get:
      summary: Export analytics as CSV
      tags: [Analytics]
      security: [{sessionCookie: []}, {bearerToken: []}]
      parameters:
        - {name: id,     in: path,  required: true,  schema: {type: integer}}
        - {name: period, in: query, required: false, schema: {type: string, enum: [7d, 30d, all], default: 30d}}
      responses:
        '200':
          description: CSV file
          content: {text/csv: {schema: {type: string}}}

  /sites/{id}/analytics/stream:
    get:
      summary: Real-time analytics SSE stream
      tags: [Analytics]
      security: [{sessionCookie: []}, {bearerToken: []}]
      parameters:
        - {name: id, in: path, required: true, schema: {type: integer}}
      responses:
        '200':
          description: Server-Sent Events stream of page hits
          content: {'text/event-stream': {schema: {type: string}}}

  /admin/site-health:
    get:
      summary: Site health monitoring overview
      tags: [Admin]
      security: [{sessionCookie: []}, {bearerToken: []}]
      responses:
        '200':
          description: Health status of all monitored sites
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:    {type: integer}
                  up:       {type: integer}
                  degraded: {type: integer}
                  down:     {type: integer}

  /sites/{id}/webhooks:
    get:
      summary: List webhooks for a site
      tags: [Webhooks]
      security: [{sessionCookie: []}, {bearerToken: []}]
      parameters:
        - {name: id, in: path, required: true, schema: {type: integer}}
      responses:
        '200': {description: Webhook list (secrets masked)}
    post:
      summary: Create a webhook
      tags: [Webhooks]
      security: [{sessionCookie: []}, {bearerToken: []}]
      parameters:
        - {name: id, in: path, required: true, schema: {type: integer}}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url]
              properties:
                url:     {type: string, format: uri}
                secret:  {type: string}
                events:  {oneOf: [{type: string, enum: ['*']}, {type: array, items: {type: string}}]}
                enabled: {type: boolean, default: true}
      responses:
        '201': {description: Webhook created}

  /sites/{id}/webhooks/{hookId}:
    patch:
      summary: Update a webhook
      tags: [Webhooks]
      security: [{sessionCookie: []}, {bearerToken: []}]
      parameters:
        - {name: id,     in: path, required: true, schema: {type: integer}}
        - {name: hookId, in: path, required: true, schema: {type: integer}}
      responses:
        '200': {description: Updated webhook}
    delete:
      summary: Delete a webhook
      tags: [Webhooks]
      security: [{sessionCookie: []}, {bearerToken: []}]
      parameters:
        - {name: id,     in: path, required: true, schema: {type: integer}}
        - {name: hookId, in: path, required: true, schema: {type: integer}}
      responses:
        '204': {description: Deleted}

  /sites/{id}/webhooks/{hookId}/deliveries:
    get:
      summary: List recent webhook delivery attempts
      tags: [Webhooks]
      security: [{sessionCookie: []}, {bearerToken: []}]
      parameters:
        - {name: id,     in: path, required: true, schema: {type: integer}}
        - {name: hookId, in: path, required: true, schema: {type: integer}}
      responses:
        '200': {description: Last 50 deliveries with status, timing, retry count}

  /sites/{id}/clone:
    post:
      summary: Clone a site — copy all files to a new domain
      tags: [Sites]
      security: [{sessionCookie: []}, {bearerToken: []}]
      parameters:
        - {name: id, in: path, required: true, schema: {type: integer}}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, domain]
              properties:
                name:   {type: string}
                domain: {type: string}
      responses:
        '201': {description: Cloned site, no storage duplication (objectPaths reused)}

  /sites/{id}/deployments/{depId}/diff:
    get:
      summary: File-level diff between two deployments
      tags: [Sites]
      security: [{sessionCookie: []}, {bearerToken: []}]
      parameters:
        - {name: id,    in: path,  required: true,  schema: {type: integer}}
        - {name: depId, in: path,  required: true,  schema: {type: integer}}
        - {name: base,  in: query, required: false, schema: {type: integer}, description: "Base deployment ID; defaults to previous version"}
      responses:
        '200':
          description: Diff summary with added/changed/removed/unchanged file lists
          content:
            application/json:
              schema:
                type: object
                properties:
                  summary: {type: object, properties: {added: {type: integer}, changed: {type: integer}, removed: {type: integer}, unchanged: {type: integer}, netSizeBytes: {type: integer}}}
                  added:   {type: array}
                  changed: {type: array}
                  removed: {type: array}

  /tokens:
    get:
      summary: List API tokens for the current user
      tags: [Auth]
      security: [{sessionCookie: []}]
      responses:
        '200': {description: Token list (hashes never returned, prefix shown)}
    post:
      summary: Create an API token
      tags: [Auth]
      security: [{sessionCookie: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:         {type: string}
                scopes:       {type: array, items: {type: string, enum: [read, write, deploy, admin]}, default: [read, write, deploy]}
                expiresInDays:{type: integer}
      responses:
        '201':
          description: Token created — plaintext in `token` field, shown once only

  /tokens/{id}:
    delete:
      summary: Revoke an API token
      tags: [Auth]
      security: [{sessionCookie: []}, {bearerToken: []}]
      parameters:
        - {name: id, in: path, required: true, schema: {type: integer}}
      responses:
        '204': {description: Token revoked}
        '404': {description: Token not found}

  # ── 2FA / TOTP ──────────────────────────────────────────────────────────────

  /auth/2fa/status:
    get:
      summary: Check whether 2FA is enabled for the current user
      tags: [Auth]
      security: [{sessionCookie: []}]
