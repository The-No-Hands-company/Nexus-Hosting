        - {name: buildId, in: path, required: true, schema: {type: integer}}
      responses:
        '200': {description: Build cancelled}
        '400': {description: Build cannot be cancelled}

  /sites/{id}/redirects/{ruleId}:
    delete:
      summary: Delete a redirect rule
      tags: [Sites]
      security: [{sessionCookie: []}, {bearerToken: []}]
      parameters:
        - {name: id, in: path, required: true, schema: {type: integer}}
        - {name: ruleId, in: path, required: true, schema: {type: integer}}
      responses:
        '204': {description: Rule deleted}

  /sites/{id}/headers/{headerId}:
    delete:
