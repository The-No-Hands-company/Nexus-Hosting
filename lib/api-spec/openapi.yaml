        '302': {description: Redirect}

  /api/auth/resend-verification:
    post:
      summary: Re-send email verification link (authenticated)
      tags: [Auth]
      security: [{cookieAuth: []}]
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: {type: boolean}
                  message: {type: string}

