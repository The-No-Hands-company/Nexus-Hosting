                  startedAt:    {type: string, format: date-time, nullable: true}
                  lastCrashAt:  {type: string, format: date-time, nullable: true}

  /sites/{id}/nlpl/logs:
    get:
      summary: Recent process stdout/stderr (ring buffer tail)
      tags: [NLPL]
      parameters:
        - {name: id,   in: path,  required: true,  schema: {type: integer}}
        - {name: tail, in: query, required: false, schema: {type: integer, default: 100, maximum: 500}}
      responses:
        '200':
          description: Log lines
          content:
            application/json:
              schema:
                type: object
                properties:
                  lines: {type: array, items: {type: string}}
                  count: {type: integer}

  # ── Admin: processes ─────────────────────────────────────────────────────────

  /admin/processes:
    get:
      summary: All running dynamic site processes (admin only)
      tags: [Admin]
      security: [{sessionCookie: []}]
      responses:
        '200':
          description: Process list
          content:
            application/json:
              schema:
                type: object
                properties:
                  processes: {type: array}
                  total: {type: integer}

  # ── Builds ───────────────────────────────────────────────────────────────────

  /sites/{id}/builds/{buildId}:
    get:
      summary: Get build details and log
      tags: [Builds]
      security: [{sessionCookie: []}, {bearerToken: []}]
      parameters:
        - {name: id,      in: path, required: true, schema: {type: integer}}
        - {name: buildId, in: path, required: true, schema: {type: integer}}
      responses:
        '200': {description: Build details including full log output}
    delete:
      summary: Cancel a queued build
      tags: [Builds]
      security: [{sessionCookie: []}, {bearerToken: []}]
      parameters:
        - {name: id,      in: path, required: true, schema: {type: integer}}
        - {name: buildId, in: path, required: true, schema: {type: integer}}
      responses:
        '200': {description: Build cancelled}
        '400': {description: Build cannot be cancelled (already running or finished)}

  # ── Redirects and custom headers ─────────────────────────────────────────────

  /sites/{id}/redirects/{ruleId}:
    delete:
      summary: Delete a redirect rule
      tags: [Sites]
      security: [{sessionCookie: []}, {bearerToken: []}]
      parameters:
        - {name: id,     in: path, required: true, schema: {type: integer}}
        - {name: ruleId, in: path, required: true, schema: {type: integer}}
      responses:
        '204': {description: Rule deleted}

  /sites/{id}/headers/{headerId}:
    delete:
      summary: Delete a custom response header
      tags: [Sites]
      security: [{sessionCookie: []}, {bearerToken: []}]
      parameters:
        - {name: id,       in: path, required: true, schema: {type: integer}}
        - {name: headerId, in: path, required: true, schema: {type: integer}}
      responses:
        '204': {description: Header deleted}

  # ── Forms ────────────────────────────────────────────────────────────────────

  /sites/{id}/forms/{formName}/export:
    get:
      summary: Export form submissions as CSV
      tags: [Forms]
      security: [{sessionCookie: []}, {bearerToken: []}]
      parameters:
        - {name: id,       in: path, required: true, schema: {type: integer}}
        - {name: formName, in: path, required: true, schema: {type: string}}
      responses:
        '200':
          description: CSV download
          content:
            text/csv:
              schema: {type: string}

  /sites/{id}/forms/{submissionId}:
    patch:
      summary: Mark a form submission as read/unread or add a note
      tags: [Forms]
      security: [{sessionCookie: []}, {bearerToken: []}]
      parameters:
        - {name: id,           in: path, required: true, schema: {type: integer}}
        - {name: submissionId, in: path, required: true, schema: {type: integer}}
      responses:
        '200': {description: Submission updated}
    delete:
      summary: Delete a form submission
      tags: [Forms]
      security: [{sessionCookie: []}, {bearerToken: []}]
      parameters:
        - {name: id,           in: path, required: true, schema: {type: integer}}
        - {name: submissionId, in: path, required: true, schema: {type: integer}}
      responses:
        '204': {description: Submission deleted}

  /invitations/{token}:
    get:
      summary: Look up an invitation by token (for accept page)
      tags: [Access]
      parameters:
        - {name: token, in: path, required: true, schema: {type: string}}
      responses:
        '200': {description: Invitation details including site name and inviter}
        '404': {description: Invitation not found or expired}

  /sites/{id}/invitations/{inviteId}:
    delete:
      summary: Revoke a pending invitation
      tags: [Access]
      security: [{sessionCookie: []}, {bearerToken: []}]
      parameters:
        - {name: id,       in: path, required: true, schema: {type: integer}}
        - {name: inviteId, in: path, required: true, schema: {type: integer}}
      responses:
        '204': {description: Invitation revoked}

  /sites/{id}/analytics/referrers:
    get:
      summary: Top referrers for a site over a time period
      tags: [Analytics]
      security: [{sessionCookie: []}, {bearerToken: []}]
      parameters:
        - {name: id,     in: path,  required: true, schema: {type: integer}}
        - {name: period, in: query, required: false, schema: {type: string, enum: [24h, 7d, 30d], default: 7d}}
      responses:
        '200': {description: Referrer list with hit counts}

  /stats/hourly:
    get:
      summary: Network-wide hourly activity (last 24h, for dashboard chart)
      tags: [Analytics]
      responses:
        '200': {description: Array of hourly buckets with deployment and event counts}

  /nodes/{id}/update-capacity:
    post:
      summary: Update a node's reported storage and bandwidth capacity (node-to-node)
      tags: [Nodes]
      security: [{bearerToken: []}]
      parameters:
        - {name: id, in: path, required: true, schema: {type: integer}}
      responses:
        '200': {description: Capacity updated}

  /sites/{id}/env/{key}:
    delete:
      summary: Delete a single env var by key
      tags: [Sites]
