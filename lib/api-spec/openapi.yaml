        content:
          application/json:
            schema: {type: object, required: [code], properties: {code: {type: string, minLength: 6, maxLength: 10}}}
      responses:
        '200': {description: 2FA disabled}

  /auth/2fa/backup:
    post:
      summary: Regenerate backup codes (invalidates existing codes)
      tags: [Auth]
      security: [{sessionCookie: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema: {type: object, required: [code], properties: {code: {type: string, minLength: 6, maxLength: 6}}}
