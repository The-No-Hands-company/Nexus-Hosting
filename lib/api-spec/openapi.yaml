  NodeTrust:
    type: object
    properties:
      id:               {type: integer}
      nodeDomain:       {type: string}
      trustLevel:       {type: string, enum: [unverified, verified, trusted, blocked]}
      successfulPings:  {type: integer}
      failedPings:      {type: integer}
      uptimePercent:    {type: integer}
      firstSeenAt:      {type: string, format: date-time}
      lastPingAt:       {type: string, format: date-time, nullable: true}
      manuallyReviewed: {type: integer}
      updatedAt:        {type: string, format: date-time}


  # ── Email verification ────────────────────────────────────────────────────────

  /api/auth/verify-email:
