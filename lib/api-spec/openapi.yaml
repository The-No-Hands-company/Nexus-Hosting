      siteDomain:    {type: string}
      reporterEmail: {type: string}
      reason:        {type: string}
      description:   {type: string}
      status:        {type: string, enum: [pending, under_review, resolved_removed, resolved_no_action, escalated]}
      reviewedBy:    {type: string}
      reviewedAt:    {type: string, format: date-time}
      reviewNotes:   {type: string}
      actionTaken:   {type: integer}
      createdAt:     {type: string, format: date-time}

  IpBan:
    type: object
    properties:
      id:        {type: integer}
      ipAddress: {type: string}
      cidrRange: {type: string, nullable: true}
      reason:    {type: string, nullable: true}
      scope:     {type: string, enum: [api, sites, all]}
      bannedBy:  {type: string, nullable: true}
      expiresAt: {type: string, format: date-time, nullable: true}
