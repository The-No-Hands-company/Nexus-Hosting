  /stats/hourly:
    get:
      summary: Network-wide hourly activity for dashboard chart
      tags: [Analytics]
      responses:
        '200': {description: Array of hourly buckets with deployment and event counts}

  /nodes/{id}/update-capacity:
    post:
      summary: Update a node's reported storage and bandwidth capacity
